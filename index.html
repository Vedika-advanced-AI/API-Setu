<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Setu - Holiday Notice</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .notice-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border-top: 5px solid #0056b3;
        }
        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
        }
        h1 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 24px;
        }
        .holiday-message {
            color: #d9534f;
            font-size: 20px;
            font-weight: bold;
            margin: 25px 0 10px;
        }
        .reopen-message {
            font-size: 16px;
            color: #555;
            margin-bottom: 30px;
        }
        .divider {
            border-top: 1px solid #eeeeee;
            margin: 20px 0;
        }
        .footer-link {
            font-size: 14px;
        }
        .footer-link a {
            color: #0056b3;
            text-decoration: none;
            font-weight: 500;
        }
        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="notice-container">
        <!-- Logo extracted from your link -->
        <img src="https://directory.apisetu.gov.in/apisetu_logo.png" alt="API Setu Logo" class="logo">
        
        <h1>API Setu</h1>
        
        <p class="holiday-message">Today is a holiday on the account of Muharram.</p>
        <p class="reopen-message">We will reopen tomorrow.</p>
        
        <div class="divider"></div>
        
        <!-- Terms and Conditions Link -->
        <div class="footer-link">
            <a href="https://www.meity.gov.in/terms-conditions" target="_blank" rel="noopener noreferrer">
                Government Terms & Conditions
            </a>
        </div>
    </div>

</body>
</html>
